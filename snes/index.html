<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNES Emulator: Super Nintendo</title>
    <link rel="stylesheet" href="assets/style.css">
  </head>
  <body>

    <a href="../index.html" class="btn-voltar">
      ← Voltar
    </a>

    <div id="snes-container">
        <div id="game"></div>
    </div>

    <div class="instructions" id="instructions"></div>

    <script>
        const games = {
            supermarioworld: {
                core: 'snes',
                gameName: 'SuperMarioWorld',
                gameUrl: 'game/SuperMarioWorld.smc',
                instructions: 'O save <b>não está confiável</b>.'
            }
        };

        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const gameParam = getUrlParameter('game');
        const gameConfig = games[gameParam] || games.supermarioworld;

        EJS_player = '#game';
        EJS_core = gameConfig.core;
        EJS_gameUrl = gameConfig.gameUrl;
        EJS_gameName = gameConfig.gameName;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_startOnLoaded = true;
        EJS_color = '#0064ff';
        
        EJS_defaultOptions = {
            'save-state-location': 'browser'
        };
        EJS_overrideConfig = {
            "video_vsync": "false",
            "video_threaded_video": "false",
            "video_gpu_screenshot": "false",
            "video_smooth": "false",
            
            "webgl2Enabled": "disabled", // Use "disabled" conforme seu JSON
            "screenshotSource": "canvas",
            "snes9x_audio_interpolation": "none", // Reduz carga no áudio durante o load
            "snes9x_echo_buffer_hack": "enabled", // Estabiliza o buffer de som
            "snes9x_randomize_memory": "disabled" // Garante que a RAM seja limpa de forma previsível
        };

        // EJS_gameparenturl = '../snes/';
        EJS_Buttons = {
            playPause: true,
            restart: true,
            mute: false,
            settings: true,
            fullscreen: true,
            saveState: true,
            loadState: true,
            screenRecord: false,
            gamepad: true,
            cheat: false,
            volume: true,
            saveSavFiles: false,
            loadSavFiles: false,
            quickSave: false,
            quickLoad: false,
            screenshot: false,
            cacheManager: false,
            exitEmulation: false
        }

        EJS_DEBUG_XX = true;

        if (gameConfig.instructions) {
            document.getElementById('instructions').innerHTML = gameConfig.instructions;
        }
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

  </body>
</html>
