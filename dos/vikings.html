<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>JS-DOS: DOOM</title>
    <style type="text/css">
      body {
        margin: 0;
        padding: 0;
        background-color: #2c2c2c;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      #dosbox {
        width: 640px; 
        height: 480px;
        border: 4px solid #333;
        border-radius: 4px;
        background-color: #000;
      }

      .dosbox-container { width: 640px; height: 480px; }
      .dosbox-start {
        color: #32C7FF !important;
      }
      .dosbox-powered {
        display: none !important;
      }

      button {
        margin-top: 20px;
        padding: 10px 25px;
        background: #FF2D9B ;
        border: none;
        border-radius: 5px;
        color: white;
        font-weight: bold;
        text-transform: uppercase;
        cursor: pointer;
      }

      .instructions {
        margin-top: 15px;
        font-size: 0.8em;
        color: #888;
        text-align: center;
      }

      .btn-voltar {
        padding: 10px 20px;
        background-color: #333;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        font-size: 12px;
        text-transform: uppercase;
        margin-bottom: 20px;
      }

      p {
        font-weight: bold;
        color: #4CAF50;
        margin: 20px 0 0 0;
      }
    </style>
  </head>
  <body>
    <button class="btn-voltar" onclick="window.location.href='../index.html'">
      ← Voltar
    </button>

    <div id="dosbox"></div>
    
    <button onclick="dosbox.requestFullScreen();">Jogar em Tela Cheia</button>

    <div class="instructions">
      Use as <b>setas</b> para mover | <b>S</b> para interagir<br>
      <b>F</b> e <b>Espaço</b> para habilidade primária | <b>D</b> para habilidade secundária<br>
      <b>E</b> para usar itens | <b>Tab</b> para escolher item | <b>Ctrl</b> para trocar de personagem
    </div>

    <script type="text/javascript" src="https://js-dos.com/cdn/js-dos-api.js"></script>
    <script type="text/javascript">
      // --- BLOQUEIO DE TECLAS DE SISTEMA ---
      window.addEventListener('keydown', function (e) {
        // 1. Bloqueia Alt + Setas (Navegação de página: Voltar/Avançar)
        if (e.altKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
            e.preventDefault();
            e.stopImmediatePropagation();
        }

        // 2. Bloqueia a tecla Alt sozinha (Evita que o Windows tire o foco para o menu do browser)
        if (e.key === 'Alt') {
            e.preventDefault();
            e.stopImmediatePropagation();
        }
      }, { capture: true });
      
      var dosbox = new Dosbox({
        id: "dosbox",
        onload: function (dosbox) {
          dosbox.run("game/VIKINGS.zip", "VIKINGS.EXE");
        },
        onrun: function (dosbox, app) {
          console.log("App '" + app + "' is runned");
        }
      });
    </script>
  </body>
</html>
